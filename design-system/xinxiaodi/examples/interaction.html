<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信小递 - 交互演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #F3F5F7; font-family: 'PingFang SC', -apple-system, sans-serif; }
  .back-bar { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: #FFFFFF; border-bottom: 1px solid #E5E6EB; display: flex; align-items: center; padding: 0 16px; gap: 12px; z-index: 1000; }
  .back-bar__btn { display: flex; align-items: center; gap: 4px; font-size: 14px; color: #00AAA6; text-decoration: none; cursor: pointer; transition: opacity 0.2s; }
  .back-bar__btn:hover { opacity: 0.7; }
  .back-bar__title { font-size: 14px; font-weight: 500; color: #1D2129; }
  .back-bar__tag { font-size: 10px; color: #7C8492; background: #F3F5F7; padding: 2px 6px; border-radius: 3px; }
  .frame-wrap { padding-top: 48px; display: flex; justify-content: center; padding-bottom: 24px; }
  .phone-frame { width: 375px; height: 812px; border: 1px solid #E5E6EB; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.08); margin-top: 24px; }
  .phone-frame iframe { width: 375px; height: 812px; border: none; }
</style>
</head>
<body>
<div class="back-bar">
  <a class="back-bar__btn" href="index.html">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 4L6 8L10 12" stroke="#00AAA6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    返回目录
  </a>
  <div class="back-bar__title">交互演示 (Interaction Demo)</div>
  <span class="back-bar__tag">交互参考</span>
</div>
<div class="frame-wrap">
  <div class="phone-frame">
    <iframe src="demo-interaction.html"></iframe>
  </div>
</div>
</body>
</html>
